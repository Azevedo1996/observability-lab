apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Zabbix
    uid: zabbix
    type: alexanderzobnin-zabbix-datasource
    access: proxy
    url: http://zabbix-web-nginx-pgsql:8080/api_jsonrpc.php
    isDefault: false
    editable: true
    jsonData:
      username: Admin
      trends: true
      trendsFrom: 7d
      trendsRange: 4d
      cacheTTL: 1h
      alerting: true
      addThresholds: false
      alertingMinSeverity: 3
      disableDataAlignment: false
      useZabbixValueMapping: true
    secureJsonData:
      password: zabbix
