global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: rocky-node-targets
    metrics_path: /metrics
    static_configs:
      - targets:
          - node-app-01:9100
          - node-app-02:9100
        labels:
          lab: observability-lab
          os_family: rhel
          base_image: rockylinux9
